  - uid: mondoo-macos-security-do-not-enable-the-root-account
    title: Do not enable the "root" account
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      command("dscl . -read /Users/root AuthenticationAuthority").stderr.contains("No such key: AuthenticationAuthority")
    docs:
      desc: |
        This check ensures that the root account is disabled on macOS systems to prevent unauthorized access and misuse of superuser privileges.

        **Why this matters**

        The root account is a superuser account with unrestricted access to all files and system functions. While it can be useful for administrative tasks, enabling the root account introduces significant security risks, such as unauthorized access, privilege escalation, and potential misuse.

        By disabling the root account, organizations can:
          - Reduce the attack surface of the system
          - Prevent unauthorized access to sensitive system functions
          - Enhance security posture in environments handling sensitive data or exposed to untrusted networks

        Without these protections, an enabled root account may inadvertently expose the system to potential threats, undermining its overall security posture.
      audit: |
        Verify that the root account is disabled from the macOS shell.

        1. Open the **Terminal** app.
        2. Query the root account's authentication authority:

           ```bash
           dscl . -read /Users/root AuthenticationAuthority
           ```

        A passing result reports `No such key: AuthenticationAuthority`, confirming the root account is disabled. A failing result returns an `AuthenticationAuthority` value, indicating the root account is enabled.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Run this command to disable the root account:

            ```bash
            sudo dsenableroot -d
            ```

            The command prompts for an administrator account password before disabling root.

            **Impact:**

            Disabling the root account may affect legacy POSIX software that expects an available root account. Ensure alternative administrative methods are in place if required.
        - id: gui
          desc: |
            **Using the GUI**

            1. Open **/System/Library/CoreServices/Applications/Directory Utility**
            2. Select the lock icon to unlock the service
            3. Select **Edit**
            4. Select **Disable Root User**

            **Impact:**

            Disabling the root account may affect legacy POSIX software that expects an available root account. Ensure alternative administrative methods are in place if required.
        - id: ansible
          desc: |
            **Using Ansible**

            The `dsenableroot -d` command prompts interactively for an administrator password, so a plain command task hangs. Use the expect module and supply credentials from Ansible Vault:

            ```yaml
            ---
            - name: Disable root account
              hosts: all
              become: true
              tasks:
                - name: Disable root account
                  ansible.builtin.expect:
                    command: dsenableroot -d -u "{{ macos_admin_user }}"
                    responses:
                      'password:': "{{ macos_admin_password }}"
                  no_log: true
            ```

            Store `macos_admin_user` and `macos_admin_password` in Ansible Vault and never in plain text.

            **Impact:**

            Disabling the root account may affect legacy POSIX software that expects an available root account. Ensure alternative administrative methods are in place if required.
    refs:
      - url: https://support.apple.com/guide/security/welcome/web
        title: Apple Platform Security Guide
  - uid: mondoo-macos-security-enable-filevault
    title: Enable FileVault
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      macos.filevault.enabled == true
    docs:
      desc: |-
        This check ensures that FileVault is enabled on macOS systems to secure the system's data by encrypting its boot volume and requiring a password or recovery key to access it.

        **Why this matters**

        FileVault provides full-disk encryption to protect sensitive data on macOS systems. By encrypting the boot volume, FileVault ensures that unauthorized users cannot access the system's data, even if the physical device is compromised. This is particularly important for devices that are frequently used in untrusted environments or contain sensitive information.

        Enabling FileVault contributes to:
          - Enhanced data security and privacy
          - Protection against unauthorized access in case of device theft or loss
          - Compliance with security best practices and organizational policies

        Without FileVault, the system's data is vulnerable to unauthorized access, undermining its overall security posture.
      audit: |
        ### Audit via System Settings

        1. Open **System Settings**.
        2. Select **Privacy & Security**.
        3. Review the **FileVault** section.

        A passing result shows FileVault turned on for the startup disk. A failing result shows FileVault turned off.

        ### Audit via CLI

        1. Open the **Terminal** app.
        2. Query the FileVault status:

           ```bash
           fdesetup status
           ```

        A passing result returns `FileVault is On`. A failing result returns `FileVault is Off`.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Run this command to enable FileVault:

            ```bash
            sudo fdesetup enable
            ```

            You will be prompted to provide a password for the user account and will receive a recovery key. Store the recovery key securely, as it will be required to unlock the disk if the password is forgotten.

            Note: To pass this check and make sure encryption cannot be turned off by the system, you need to [make sure that the Device Management Profile property `dontAllowFDEDisable` is set to 'true'.](https://developer.apple.com/documentation/devicemanagement/fdefilevaultoptions). To do so you can use an macOS configuration profile [similar to this one.](https://github.com/gregneagle/profiles/blob/master/cant_disable_filevault.mobileconfig)

            **Impact:**

            Enabling FileVault may impact system performance during encryption and decryption processes. However, the security benefits of full-disk encryption outweigh the potential performance impact, especially for devices handling sensitive data.
        - id: gui
          desc: |
            **Using the GUI**

            Perform the following to enable FileVault:

            1. Open **System Settings**
            2. Select **Privacy & Security**
            3. Select **FileVault**
            4. Select **Turn On**

            On macOS 12 and earlier, open **System Preferences**, select **Security & Privacy**, select **FileVault**, and select **Turn On FileVault**.

            Record the recovery key shown during setup and store it securely. The recovery key is required to unlock the disk if every enabled account password is forgotten.

            Note: To pass this check and ensure users cannot turn encryption off, the Device Management profile property [`dontAllowFDEDisable` must be set to true](https://developer.apple.com/documentation/devicemanagement/fdefilevaultoptions). You can deploy a macOS configuration profile [similar to this one](https://github.com/gregneagle/profiles/blob/master/cant_disable_filevault.mobileconfig).

            **Impact:**

            Enabling FileVault may impact system performance during encryption and decryption processes. However, the security benefits of full-disk encryption outweigh the potential performance impact, especially for devices handling sensitive data.
        - id: ansible
          desc: |
            **Using Ansible**

            A bare `fdesetup enable` prompts for a password and cannot run unattended. Use deferred enablement, which activates FileVault at the user's next logout and writes the recovery key to a file you must collect and escrow:

            ```yaml
            ---
            - name: Enable FileVault
              hosts: all
              become: true
              tasks:
                - name: Enable FileVault at next logout
                  ansible.builtin.command: fdesetup enable -defer /var/db/filevault-recovery.plist
                - name: Fetch the recovery key for escrow
                  ansible.builtin.fetch:
                    src: /var/db/filevault-recovery.plist
                    dest: filevault-keys/
                - name: Remove the local recovery key copy
                  ansible.builtin.file:
                    path: /var/db/filevault-recovery.plist
                    state: absent
            ```

            Store the fetched recovery keys in a secure escrow location. If the recovery key is lost and a user forgets their password, the encrypted data cannot be recovered. In MDM-managed fleets, prefer enabling FileVault through an MDM profile with institutional key escrow instead.

            Note: To pass this check and ensure users cannot turn encryption off, the Device Management profile property [`dontAllowFDEDisable` must be set to true](https://developer.apple.com/documentation/devicemanagement/fdefilevaultoptions).

            **Impact:**

            Enabling FileVault may impact system performance during encryption and decryption processes. However, the security benefits of full-disk encryption outweigh the potential performance impact, especially for devices handling sensitive data.
    refs:
      - url: https://support.apple.com/guide/mac-help/protect-data-on-your-mac-with-filevault-mh11785/mac
        title: Apple - Protect Data with FileVault
  - uid: mondoo-macos-security-enable-firewall
    title: Enable Firewall
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: |
      command("/usr/libexec/ApplicationFirewall/socketfilterfw --getglobalstate").stdout.contains("enabled")
    docs:
      desc: |
        This check ensures that the firewall is enabled on macOS systems to block unwanted incoming connections and enhance system security.

        **Why this matters**

        A firewall acts as a barrier between the system and external networks, preventing unauthorized access and mitigating potential threats. By enabling the firewall, organizations can:
          - Reduce the attack surface of the system
          - Block unwanted or malicious incoming connections
          - Enhance security posture in environments handling sensitive data or exposed to untrusted networks

        Without these protections, the system may be vulnerable to unauthorized access, compromising its overall security posture.
      audit: |
        ### Audit via System Settings

        1. Open **System Settings**.
        2. Select **Network**, then **Firewall**.
        3. Review the firewall toggle.

        A passing result shows the firewall turned on. A failing result shows it turned off.

        ### Audit via CLI

        1. Open the **Terminal** app.
        2. Query the global firewall state:

           ```bash
           /usr/libexec/ApplicationFirewall/socketfilterfw --getglobalstate
           ```

        A passing result reports `Firewall is enabled`. A failing result reports `Firewall is disabled`.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Run this command to enable the firewall:

            ```bash
            sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate on
            ```

            **Impact:**

            Enabling the firewall may block legitimate traffic. Unsigned applications may require special handling to function properly.
        - id: gui
          desc: |
            **Using the GUI**

            1. Open **System Settings**
            2. Select **Network**
            3. Select **Firewall**
            4. Turn on the **Firewall** toggle

            On macOS 12 and earlier, open **System Preferences**, select **Security & Privacy**, select **Firewall**, and select **Turn On Firewall**.

            **Impact:**

            Enabling the firewall may block legitimate traffic. Unsigned applications may require special handling to function properly.
        - id: ansible
          desc: |
            **Using Ansible**

            To enable the firewall using Ansible, you can use the following playbook:

            ```yaml
            ---
            - name: Enable Firewall
              hosts: all
              become: true
              tasks:
                - name: Enable Firewall
                  ansible.builtin.command: /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate on
            ```

            **Impact:**

            Enabling the firewall may block legitimate traffic. Unsigned applications may require special handling to function properly.
    refs:
      - url: https://support.apple.com/guide/mac-help/change-firewall-settings-on-mac-mh11783/mac
        title: Apple - Firewall Settings

  - uid: mondoo-macos-security-enable-gatekeeper
    title: Enable Gatekeeper
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-19
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-05
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-11
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-9
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      macos.gatekeeper.enabled == true
    docs:
      desc: |
        This check ensures that Gatekeeper is enabled on macOS systems to restrict downloaded applications from launching unless they are from verified sources.

        **Why this matters**

        Gatekeeper is Apple's application allow-listing control that limits applications from unverified sources from running without authorization. By enabling Gatekeeper, organizations can:
          - Reduce the risk of running malicious or unauthorized applications
          - Enhance security posture by enforcing application verification
          - Prevent accidental execution of potentially harmful software

        Without these protections, macOS systems may inadvertently run unverified applications, increasing the risk of malware infections and unauthorized access.
      audit: |
        ### Audit via System Settings

        1. Open **System Settings**.
        2. Select **Privacy & Security**.
        3. Review the **Allow applications downloaded from** setting.

        A passing result shows **App Store and identified developers** selected. A failing result shows **Anywhere** or that Gatekeeper is otherwise disabled.

        ### Audit via CLI

        1. Open the **Terminal** app.
        2. Query the Gatekeeper assessment status:

           ```bash
           spctl --status
           ```

        A passing result returns `assessments enabled`. A failing result returns `assessments disabled`.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Run this command to enable Gatekeeper assessments:

            ```bash
            sudo spctl --global-enable
            ```

            On older macOS versions the equivalent command is `sudo spctl --master-enable`. Starting with macOS Sequoia, Apple restricts command-line changes to Gatekeeper policy; if the command reports the operation is not permitted, enforce the setting with a configuration profile instead.

            Note: To pass this check, you must also deploy a Device Management configuration profile with the [`com.apple.systempolicy.control`](https://developer.apple.com/documentation/devicemanagement/systempolicycontrol) payload that sets `EnableAssessment` to true and `AllowIdentifiedDevelopers` to true. Without that managed preference the check fails even when `spctl --status` reports assessments enabled.

            **Impact:**

            Enabling Gatekeeper may block applications from unverified sources. Ensure that any required applications are properly signed or explicitly allowed by the user.
        - id: gui
          desc: |
            **Using the GUI**

            1. Open **System Settings**
            2. Select **Privacy & Security**
            3. Under **Security**, set **Allow applications downloaded from** to **App Store and identified developers**

            On macOS 12 and earlier, open **System Preferences**, select **Security & Privacy**, select **General**, and set **Allow apps downloaded from** to **App Store and identified developers**.

            Note: To pass this check, you must also deploy a Device Management configuration profile with the [`com.apple.systempolicy.control`](https://developer.apple.com/documentation/devicemanagement/systempolicycontrol) payload that sets `EnableAssessment` to true and `AllowIdentifiedDevelopers` to true.

            **Impact:**

            Enabling Gatekeeper may block applications from unverified sources. Ensure that any required applications are properly signed or explicitly allowed by the user.
        - id: ansible
          desc: |
            **Using Ansible**

            To enable Gatekeeper using Ansible, you can use the following playbook:

            ```yaml
            ---
            - name: Enable Gatekeeper
              hosts: all
              become: true
              tasks:
                - name: Enable Gatekeeper assessments
                  ansible.builtin.command: spctl --global-enable
            ```

            On macOS versions that restrict `spctl` policy changes, deploy a Device Management configuration profile with the `com.apple.systempolicy.control` payload instead. That profile is also required for this check to pass.

            **Impact:**

            Enabling Gatekeeper may block applications from unverified sources. Ensure that any required applications are properly signed or explicitly allowed by the user.
    refs:
      - url: https://support.apple.com/guide/security/gatekeeper-and-runtime-protection-sec5599b66df/web
        title: Apple Platform Security - Gatekeeper

  - uid: mondoo-macos-security-ensure-firewall-is-configured-to-log
    title: Ensure Firewall is configured to log
    impact: 30
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ivs-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-e-1-transmission
      compliance/iso-27001-2022: iso-27001-2022-a-8-20
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ac-5
      compliance/nist-csf-2: nist-csf-2-pr-ir-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-6
      compliance/pci-dss-4: pcidss-requirement-1-3-1
      compliance/soc2-2017: soc2-control-cc6-6-4
      compliance/vda-isa-5: vda-isa-5-5-2-6
    mql: macos.firewall.loggingEnabled == true
    docs:
      desc: |
        This check ensures that the firewall is configured to log activity on macOS systems, providing visibility into allowed and denied network connections.

        **Why this matters**

        The socketfilter firewall is used when the firewall is enabled in the Security Preference Pane. Enabling logging ensures that all access attempts, both allowed and denied, are recorded. This information is critical for monitoring network activity, detecting potential threats, and troubleshooting connectivity issues.

        By enabling firewall logging, organizations can:
          - Gain visibility into network access attempts
          - Detect unauthorized or suspicious activity
          - Enhance security posture by monitoring and analyzing firewall logs

        Without logging enabled, critical information about network activity may be lost, reducing the ability to detect and respond to potential threats.
      audit: |
        ### Audit via System Settings

        1. Open **System Settings**.
        2. Select **Network**, then **Firewall**.
        3. Select **Options** and review the firewall logging setting.

        A passing result shows firewall logging turned on. A failing result shows it turned off.

        ### Audit via CLI

        1. Open the **Terminal** app.
        2. Query the firewall logging mode:

           ```bash
           /usr/libexec/ApplicationFirewall/socketfilterfw --getloggingmode
           ```

        A passing result reports `Log mode is on`. A failing result reports `Log mode is off`.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Run this command to enable logging for the firewall:

            ```bash
            sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setloggingmode on
            ```

            **Impact:**

            Enabling detailed logging may result in increased storage usage. Regular log review and archiving are recommended to manage disk space effectively.
        - id: gui
          desc: |
            **Using the GUI**

            macOS provides no graphical control for application firewall logging. Use the CLI command to enable it:

            ```bash
            sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setloggingmode on
            ```

            **Impact:**

            Enabling detailed logging may result in increased storage usage. Regular log review and archiving are recommended to manage disk space effectively.
        - id: ansible
          desc: |
            **Using Ansible**

            To enable firewall logging using Ansible, you can use the following playbook:

            ```yaml
            ---
            - name: Enable Firewall logging
              hosts: all
              become: true
              tasks:
                - name: Enable Firewall logging
                  ansible.builtin.command: /usr/libexec/ApplicationFirewall/socketfilterfw --setloggingmode on
            ```

            **Impact:**

            Enabling detailed logging may result in increased storage usage. Regular log review and archiving are recommended to manage disk space effectively.
    refs:
      - url: https://support.apple.com/guide/mac-help/change-firewall-settings-on-mac-mh11783/mac
        title: Apple - Firewall Settings
  - uid: mondoo-macos-security-ensure-http-server-is-not-running
    title: Ensure http server is not running
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      service('org.apache.httpd') {
        enabled == false
        running == false
      }
    docs:
      desc: |
        This check ensures that the HTTP server is disabled on macOS systems to prevent unauthorized access and misuse of the embedded Apache web server.

        **Why this matters**

        macOS includes an embedded Apache web server that can be easily enabled to share files or provide remote connectivity. While this feature can be useful in specific scenarios, enabling the HTTP server introduces potential vulnerabilities by exposing the system to unauthorized access or misuse. Apple has removed the graphical front-end for enabling this feature, but the underlying service remains accessible.

        By disabling the HTTP server, organizations can:
          - Reduce the attack surface of the system
          - Prevent unauthorized file sharing or remote access
          - Enhance security posture in environments handling sensitive data or exposed to untrusted networks

        Without these protections, the HTTP server may inadvertently expose the system to potential threats, undermining its overall security posture.
      audit: |
        Verify that the Apache HTTP server is not running from the macOS shell.

        1. Open the **Terminal** app.
        2. Check whether the Apache daemon is loaded:

           ```bash
           sudo launchctl list | grep org.apache.httpd
           ```

        A passing result returns no output, confirming the HTTP server is not loaded. A failing result lists `org.apache.httpd`.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Run this command to disable the HTTP server services:

            ```bash
            sudo launchctl unload -w /System/Library/LaunchDaemons/org.apache.httpd.plist
            ```

            **Impact:**

            Disabling the HTTP server prevents the system from being used as a web server, reducing its visibility and potential attack surface. For environments requiring web services, hardened web servers or appropriate cloud services should be used instead.
        - id: gui
          desc: |
            **Using the GUI**

            macOS no longer provides a graphical control for the built-in Apache web server. Apple removed the Web Sharing option from the Sharing pane. Use the CLI command to disable the service:

            ```bash
            sudo launchctl unload -w /System/Library/LaunchDaemons/org.apache.httpd.plist
            ```

            **Impact:**

            Disabling the HTTP server prevents the system from being used as a web server, reducing its visibility and potential attack surface. For environments requiring web services, hardened web servers or appropriate cloud services should be used instead.
        - id: ansible
          desc: |
            **Using Ansible**

            To disable the HTTP server using Ansible, you can use the following playbook:

            ```yaml
            ---
            - name: Disable HTTP server
              hosts: all
              become: true
              tasks:
                - name: Disable HTTP server
                  ansible.builtin.command: launchctl unload -w /System/Library/LaunchDaemons/org.apache.httpd.plist
            ```

            **Impact:**

            Disabling the HTTP server prevents the system from being used as a web server, reducing its visibility and potential attack surface. For environments requiring web services, hardened web servers or appropriate cloud services should be used instead.
    refs:
      - url: https://support.apple.com/guide/security/welcome/web
        title: Apple Platform Security Guide
  - uid: mondoo-macos-security-ensure-nfs-server-is-not-running
    title: Ensure NFS server is not running
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      service('com.apple.nfsd').running == false
    docs:
      desc: |
        This check ensures that the NFS server is disabled on macOS systems to prevent unauthorized file sharing and mitigate security risks.

        **Why this matters**

        macOS can act as an NFS file server, allowing other computers to mount shares and access information from the user's system. While this feature can be useful in specific scenarios, enabling NFS sharing introduces potential vulnerabilities by exposing the system to unauthorized access or misuse. Apple has removed the GUI capability for enabling NFS sharing, but the underlying service remains accessible.

        By disabling the NFS server, organizations can:
          - Reduce the attack surface of the system
          - Prevent unauthorized file transfers
          - Enhance security posture in environments handling sensitive data or exposed to untrusted networks

        Without these protections, the NFS server may inadvertently expose the system to potential threats, undermining its overall security posture.
      audit: |
        Verify that the NFS server is not running from the macOS shell.

        1. Open the **Terminal** app.
        2. Query the NFS daemon status:

           ```bash
           sudo nfsd status
           ```

        A passing result reports that `nfsd` is disabled and not running. A failing result reports that `nfsd` is enabled or running.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Run this command to disable the NFS server services:

            ```bash
            sudo nfsd disable
            ```

            **Impact:**

            Disabling the NFS server prevents the system from being used as a file server, reducing its visibility and potential attack surface. For environments requiring file sharing, hardened servers should be used instead of user endpoints.
        - id: gui
          desc: |
            **Using the GUI**

            macOS provides no graphical control for the NFS server. The Sharing pane does not manage `nfsd`. Use the CLI command to disable it:

            ```bash
            sudo nfsd disable
            ```

            Also remove or empty `/etc/exports` so the service does not restart with active exports.

            **Impact:**

            Disabling the NFS server prevents the system from being used as a file server, reducing its visibility and potential attack surface. For environments requiring file sharing, hardened servers should be used instead of user endpoints.
        - id: ansible
          desc: |
            **Using Ansible**

            To disable the NFS server using Ansible, you can use the following playbook:

            ```yaml
            ---
            - name: Disable NFS server
              hosts: all
              become: true
              tasks:
                - name: Disable NFS server
                  ansible.builtin.command: nfsd disable
            ```

            **Impact:**

            Disabling the NFS server prevents the system from being used as a file server, reducing its visibility and potential attack surface. For environments requiring file sharing, hardened servers should be used instead of user endpoints.
    refs:
      - url: https://support.apple.com/guide/security/welcome/web
        title: Apple Platform Security Guide


  - uid: mondoo-macos-security-software-updates-automatic-check-enabled
    title: Ensure automatic checking of software updates enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      command("softwareupdate --schedule 2>/dev/null").stdout.contains(/Automatic checking.*on/i)
    docs:
      desc: |
        This check ensures that automatic checking for software updates is enabled on macOS systems to keep the system up to date with the latest patches and security updates.

        **Why this matters**

        Enabling automatic checking for software updates ensures that the system regularly checks for available updates, reducing the risk of vulnerabilities caused by outdated software. This is critical for maintaining system security and stability.

        By enabling automatic update checks, organizations can:
          - Ensure timely awareness of available updates
          - Reduce the risk of exploitation of known vulnerabilities
          - Enhance overall system security and compliance with best practices

        Without these protections, the system may remain vulnerable to known threats, undermining its overall security posture.
      audit: |
        ### Audit via System Settings

        1. Open **System Settings**.
        2. Select **General**, then **Software Update**.
        3. Select the info button next to **Automatic updates** and review **Check for updates**.

        A passing result shows **Check for updates** turned on. A failing result shows it turned off.

        ### Audit via CLI

        1. Open the **Terminal** app.
        2. Read the automatic check preference:

           ```bash
           defaults read /Library/Preferences/com.apple.SoftwareUpdate AutomaticCheckEnabled
           ```

        A passing result returns `1`. A failing result returns `0`.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Run this command to enable automatic update checks:

            ```bash
            sudo /usr/bin/defaults write /Library/Preferences/com.apple.SoftwareUpdate AutomaticCheckEnabled -bool true
            ```

            **Impact:**

            Enabling automatic update checks ensures that the system stays informed about available updates. However, users must still manually approve or install updates unless additional automatic update settings are enabled.
        - id: gui
          desc: |
            **Using the GUI**

            1. Open **System Settings**
            2. Select **General**
            3. Select **Software Update**
            4. Select the info button next to **Automatic updates**
            5. Turn on **Check for updates**

            On macOS 12 and earlier, open **System Preferences**, select **Software Update**, select **Advanced**, and enable **Check for updates**.

            **Impact:**

            Enabling automatic update checks ensures that the system stays informed about available updates. However, users must still manually approve or install updates unless additional automatic update settings are enabled.
        - id: ansible
          desc: |
            **Using Ansible**

            To enable automatic update checks using Ansible, you can use the following playbook:

            ```yaml
            ---
            - name: Enable automatic update checks
              hosts: all
              become: true
              tasks:
                - name: Enable automatic update checks
                  ansible.builtin.command: /usr/bin/defaults write /Library/Preferences/com.apple.SoftwareUpdate AutomaticCheckEnabled -bool true
            ```

            **Impact:**

            Enabling automatic update checks ensures that the system stays informed about available updates. However, users must still manually approve or install updates unless additional automatic update settings are enabled.
    refs:
      - url: https://support.apple.com/guide/mac-help/keep-your-mac-up-to-date-mchlpx1065/mac
        title: Apple - Keep Your Mac Up to Date
  - uid: mondoo-macos-security-software-updates-automatic-download
    title: Ensure automatic download of software updates enabled
    impact: 80
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-tvm-03
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-8
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-12
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/nist-sp-800-171: nist-sp-800-171--3-14-1
      compliance/pci-dss-4: pcidss-requirement-6-3-3
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      command("defaults read /Library/Preferences/com.apple.SoftwareUpdate AutomaticDownload 2>/dev/null").stdout.trim == "1"
    docs:
      desc: |
        This check ensures that automatic downloads of software updates are enabled on macOS systems to keep the system up to date with the latest patches and security updates.

        **Why this matters**

        Enabling automatic downloads of software updates ensures that the system regularly downloads available updates, reducing the risk of vulnerabilities caused by outdated software. This is critical for maintaining system security and stability.

        By enabling automatic update downloads, organizations can:
          - Ensure timely availability of updates for installation
          - Reduce the risk of exploitation of known vulnerabilities
          - Enhance overall system security and compliance with best practices

        Without these protections, the system may remain vulnerable to known threats, undermining its overall security posture.
      audit: |
        ### Audit via System Settings

        1. Open **System Settings**.
        2. Select **General**, then **Software Update**.
        3. Select the info button next to **Automatic updates** and review **Download new updates when available**.

        A passing result shows **Download new updates when available** turned on. A failing result shows it turned off.

        ### Audit via CLI

        1. Open the **Terminal** app.
        2. Read the automatic download preference:

           ```bash
           defaults read /Library/Preferences/com.apple.SoftwareUpdate AutomaticDownload
           ```

        A passing result returns `1`. A failing result returns `0`.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Run this command to enable automatic downloads:

            ```bash
            sudo /usr/bin/defaults write /Library/Preferences/com.apple.SoftwareUpdate AutomaticDownload -bool true
            ```

            **Impact:**

            Enabling automatic downloads ensures that updates are readily available for installation. However, users must still manually approve or install updates unless additional automatic update settings are enabled.
        - id: gui
          desc: |
            **Using the GUI**

            1. Open **System Settings**
            2. Select **General**
            3. Select **Software Update**
            4. Select the info button next to **Automatic updates**
            5. Turn on **Download new updates when available**

            On macOS 12 and earlier, open **System Preferences**, select **Software Update**, select **Advanced**, and enable **Download new updates when available**.

            **Impact:**

            Enabling automatic downloads ensures that updates are readily available for installation. However, users must still manually approve or install updates unless additional automatic update settings are enabled.
        - id: ansible
          desc: |
            **Using Ansible**

            To enable automatic downloads using Ansible, you can use the following playbook:

            ```yaml
            ---
            - name: Enable automatic downloads of software updates
              hosts: all
              become: true
              tasks:
                - name: Enable automatic downloads of software updates
                  ansible.builtin.command: /usr/bin/defaults write /Library/Preferences/com.apple.SoftwareUpdate AutomaticDownload -bool true
            ```

            **Impact:**

            Enabling automatic downloads ensures that updates are readily available for installation. However, users must still manually approve or install updates unless additional automatic update settings are enabled.
    refs:
      - url: https://support.apple.com/guide/mac-help/keep-your-mac-up-to-date-mchlpx1065/mac
        title: Apple - Keep Your Mac Up to Date
