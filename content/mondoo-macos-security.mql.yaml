      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: macos.sharing.mediaSharing == false
    docs:
      desc: |
        This check ensures that Media Sharing is disabled on macOS systems to prevent unauthorized access to shared media content. Media Sharing allows a Mac to share downloaded content, such as movies, music, or TV shows, with other Apple devices signed in with the same Apple ID or on the same network.

        **Why this matters**

        Media Sharing enables a Mac to act as a server for Apple-downloaded content, allowing other devices to access pre-downloaded media. While this feature can be convenient, it introduces potential vulnerabilities by exposing media content to unauthorized devices on the same network.

        By disabling Media Sharing, organizations can:
          - Reduce the attack surface of the system
          - Prevent unauthorized access to shared media
          - Enhance security posture in environments handling sensitive data or exposed to untrusted networks

        Without these protections, Media Sharing may inadvertently expose sensitive content or allow unauthorized devices to access shared media, undermining the overall security posture of the system.
      audit: |
        ### Audit via System Settings

        1. Open **System Settings**.
        2. Select **General**, then **Sharing**.
        3. Review the **Media Sharing** setting.

        A passing result shows **Media Sharing** turned off. A failing result shows it turned on.

        ### Audit via CLI

        1. Open the **Terminal** app.
        2. Read the media sharing preference for the logged-in user:

           ```bash
           defaults read com.apple.amp.mediasharingd home-sharing-enabled
           ```

        A passing result returns `0` or reports that the key does not exist. A failing result returns `1`.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Run this command to disable Media Sharing:

            ```bash
            sudo -u <username> defaults write com.apple.amp.mediasharingd home-sharing-enabled -int 0
            ```

            This preference is stored per user, so repeat the command for every account on the system. For fleet-wide enforcement, deploy a configuration profile through your MDM instead, which applies the setting to all current and future users.

            **Impact:**

            Disabling Media Sharing prevents the system from being used as a media server, reducing its visibility and potential attack surface. For environments requiring media sharing, dedicated servers should be used instead of user endpoints.
        - id: gui
          desc: |
            **Using the GUI**

            1. Open **System Settings**
            2. Select **General**
            3. Select **Sharing**
            4. Turn off **Media Sharing**

            On macOS 12 and earlier, open **System Preferences**, select **Sharing**, and uncheck **Media Sharing**.

            **Impact:**

            Disabling Media Sharing prevents the system from being used as a media server, reducing its visibility and potential attack surface. For environments requiring media sharing, dedicated servers should be used instead of user endpoints.
        - id: ansible
          desc: |
            **Using Ansible**

            To disable Media Sharing using Ansible, run the task as the user whose preference you are changing:

            ```yaml
            ---
            - name: Disable Media Sharing
              hosts: all
              become: true
              become_user: firstuser
              tasks:
                - name: Disable Media Sharing for the user
                  ansible.builtin.command: defaults write com.apple.amp.mediasharingd home-sharing-enabled -int 0
            ```

            Replace `firstuser` with the account that has Media Sharing enabled. This preference is stored per user, so run the task with `become_user` set to each account on the system. For fleet-wide enforcement, deploy a configuration profile through your MDM instead, which applies the setting to all current and future users.

            **Impact:**

            Disabling Media Sharing prevents the system from being used as a media server, reducing its visibility and potential attack surface. For environments requiring media sharing, dedicated servers should be used instead of user endpoints.
