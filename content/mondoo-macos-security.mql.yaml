policies:
  - uid: mondoo-macos-security
    name: Mondoo macOS Security
    version: 1.6.0-simplerose
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: macos
    require:
      - provider: os
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure macOS firewall, FileVault, Gatekeeper, and more
    docs:
      desc: |
        The Mondoo macOS Security policy identifies critical misconfigurations on macOS systems that could leave end-user devices vulnerable to malware, unauthorized access, and data exfiltration. This policy helps organizations detect and remediate hardening gaps before attackers can exploit them to access sensitive data through file sharing services, gain unauthorized remote access, or compromise systems through network-based attacks.

        This policy provides security checks across key macOS areas:

        - FileVault full-disk encryption
        - Application firewall configuration
        - Gatekeeper and System Integrity Protection
        - Sharing services such as Screen Sharing, File Sharing, and Remote Login
        - Remote access configurations
        - Network security settings and Bluetooth controls
        - Software update posture

        This policy was tested against Apple macOS 10.15, 11, 12, 13, and 14.

        Learn more about scanning macOS in the [cnspec macOS documentation](https://mondoo.com/docs/cnspec/os/mac).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Core
        filters: |
          asset.platform == "macos"
        checks:
          - uid: mondoo-macos-security-disable-bluetooth-sharing
          - uid: mondoo-macos-security-disable-content-caching
          - uid: mondoo-macos-security-disable-file-sharing
          - uid: mondoo-macos-security-disable-internet-sharing
          - uid: mondoo-macos-security-disable-media-sharing
          - uid: mondoo-macos-security-disable-printer-sharing
          - uid: mondoo-macos-security-disable-remote-apple-events
          - uid: mondoo-macos-security-disable-remote-management
          - uid: mondoo-macos-security-disable-screen-sharing
          - uid: mondoo-macos-security-enable-filevault
          - uid: mondoo-macos-security-enable-firewall
          - uid: mondoo-macos-security-enable-gatekeeper
          - uid: mondoo-macos-security-ensure-http-server-is-not-running
          - uid: mondoo-macos-security-ensure-nfs-server-is-not-running
          - uid: mondoo-macos-security-software-updates-automatic-check-enabled
          - uid: mondoo-macos-security-software-updates-automatic-download
          - uid: simplerose-macos-security-crowdstrike-installed
      - title: Account Security
        filters: |
          asset.platform == "macos"
        checks:
          - uid: mondoo-macos-security-do-not-enable-the-root-account
      - title: Logging
        filters: |
          asset.platform == "macos"
        checks:
          - uid: mondoo-macos-security-control-access-to-audit-records
          - uid: mondoo-macos-security-ensure-firewall-is-configured-to-log
queries:
  - uid: mondoo-macos-security-control-access-to-audit-records
    title: Control access to audit records
    impact: 40
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-log-08
      compliance/dora: dora-art-10
      compliance/hipaa: hipaa-security-ss164-312-b-audit-controls
      compliance/iso-27001-2022: iso-27001-2022-a-8-15
      compliance/nis-2: nis-2-21-2-b
      compliance/nist-csf-1: nist-csf-1-de-cm-1
      compliance/nist-csf-2: nist-csf-2-de-cm-09
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-au-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-3-1
      compliance/pci-dss-4: pcidss-requirement-10-2-1
      compliance/soc2-2017: soc2-control-cc7-2-1
      compliance/vda-isa-5: vda-isa-5-5-2-4
    mql: |
      auditControlPath = [
        "/etc/security/audit_control",
      ]
      auditControlPath.where(file(_).exists) {
        file(_) {
        path
        permissions.user_readable
        permissions.user_writeable
        permissions.user_executable == false

        permissions.group_writeable == false
        permissions.group_executable == false

        permissions.other_readable == false
        permissions.other_writeable == false
        permissions.other_executable == false

        user.name == "root"
        group.name == "wheel"
        }
      }
      files.find(from: "/var/audit/", type: "file,dir", xdev: false).all(user.name == "root" && group.name == "wheel" && permissions.other_readable == false && permissions.other_writeable == false && permissions.other_executable == false)
    docs:
      desc: |
        This check ensures that the audit system on macOS is properly configured to protect critical operational and security information. The audit logs and configuration files should be owned by the root user and the wheel group, with strict read-only permissions to prevent unauthorized access or tampering.

        **Why this matters**

        The macOS audit system records important security and operational events, which can be valuable for detecting anomalies, investigating incidents, and maintaining system integrity. However, these logs can also be a target for attackers seeking to obfuscate their actions or gain unauthorized access.

        By ensuring that the `/etc/security/audit_control` configuration file and the files in `/var/audit` are owned by root and the wheel group, with no access granted to other users, the risk of unauthorized access or tampering is minimized. This configuration supports a defense-in-depth strategy by safeguarding critical audit records.

        Properly securing audit logs contributes to:
          - Enhanced system integrity and trustworthiness
          - Improved incident response and forensic capabilities
          - Compliance with security best practices and standards

        Without these protections, audit logs may be vulnerable to unauthorized changes, undermining their reliability and the overall security posture of the system.
      audit: |
        Verify the ownership and permissions of the audit configuration file and audit logs from the macOS shell.

        1. Open the **Terminal** app.
        2. Check the configuration file:

           ```bash
           ls -le /etc/security/audit_control
           ```

        3. Check the audit log directory:

           ```bash
           ls -le /var/audit/
           ```

        A passing result shows `/etc/security/audit_control` and every entry under `/var/audit/` owned by `root:wheel` with no read, write, or execute access for other users. A failing result shows another owner or group, or any permission granted to group or other beyond the expected read-only access.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Run the following commands to secure the audit configuration file and audit logs:

            ```bash
            sudo chown root:wheel /etc/security/audit_control
            sudo chmod 600 /etc/security/audit_control
            sudo chown -R root:wheel /var/audit
            sudo find /var/audit -type d -exec chmod 700 {} +
            sudo find /var/audit -type f -exec chmod 600 {} +
            ```

            **Note:**

            Before applying these changes, verify the current access controls and investigate any unexpected modifications to the audit logs. If unauthorized changes are detected and cannot be traced, consider reinstalling the system to ensure its integrity.

            **Impact:**

            Securing audit logs prevents unauthorized access and tampering, ensuring the reliability of audit records for security monitoring and forensic analysis. However, improper permissions may disrupt legitimate access for system processes, so changes should be tested in a controlled environment before deployment.
        - id: ansible
          desc: |
            **Using Ansible**

            To secure the audit logs and configuration files using Ansible, you can use the following playbook:

            ```yaml
            ---
            - name: Secure audit logs and configuration files
              hosts: all
              become: true
              tasks:
                - name: Set ownership and permissions for audit_control
                  ansible.builtin.file:
                    path: /etc/security/audit_control
                    owner: root
                    group: wheel
                    mode: '0600'
                - name: Set ownership of audit logs
                  ansible.builtin.command: find /var/audit -exec chown root:wheel {} +
                - name: Set audit log directory mode
                  ansible.builtin.command: find /var/audit -type d -exec chmod 700 {} +
                - name: Set audit log file mode
                  ansible.builtin.command: find /var/audit -type f -exec chmod 600 {} +
            ```

            **Note:**

            Before applying these changes, verify the current access controls and investigate any unexpected modifications to the audit logs. If unauthorized changes are detected and cannot be traced, consider reinstalling the system to ensure its integrity.

            **Impact:**

            Securing audit logs prevents unauthorized access and tampering, ensuring the reliability of audit records for security monitoring and forensic analysis. However, improper permissions may disrupt legitimate access for system processes, so changes should be tested in a controlled environment before deployment.
    refs:
      - url: https://support.apple.com/guide/security/welcome/web
        title: Apple Platform Security Guide
  - uid: mondoo-macos-security-disable-bluetooth-sharing
    title: Disable Bluetooth Sharing
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: macos.sharing.bluetoothSharing == false
    docs:
      desc: |-
        This check ensures that Bluetooth Sharing is disabled on macOS systems. Bluetooth Sharing allows files to be exchanged with Bluetooth-enabled devices, which can pose a security risk if not properly managed.

        **Why this matters**

        Bluetooth Sharing enables file transfers between macOS devices and other Bluetooth-enabled devices. While this feature can be convenient, it also introduces potential vulnerabilities, such as unauthorized access to shared files or exploitation of Bluetooth-related security flaws.

        Disabling Bluetooth Sharing reduces the attack surface of the system by preventing unauthorized file exchanges and mitigating risks associated with Bluetooth-based exploits. This is particularly important in environments where sensitive data is handled or where devices are exposed to untrusted networks.

        By ensuring Bluetooth Sharing is disabled, organizations can enhance the security posture of macOS systems and align with best practices for minimizing unnecessary services and features that could be exploited by attackers.
      audit: |
        ### Audit via System Settings

        1. Open **System Settings**.
        2. Select **General**, then **Sharing**.
        3. Review the **Bluetooth Sharing** setting.

        A passing result shows **Bluetooth Sharing** turned off. A failing result shows it turned on.

        ### Audit via CLI

        1. Open the **Terminal** app.
        2. Read the current host Bluetooth preference:

           ```bash
           defaults -currentHost read com.apple.Bluetooth PrefKeyServicesEnabled
           ```

        A passing result returns `0` or reports that the key does not exist. A failing result returns `1`.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Run the following command to disable Bluetooth Sharing for a specific user:

            ```bash
            sudo -u <username> defaults -currentHost write com.apple.Bluetooth PrefKeyServicesEnabled -bool false
            ```

            **Example:**

            ```bash
            sudo -u firstuser defaults -currentHost write com.apple.Bluetooth PrefKeyServicesEnabled -bool false
            ```

            This preference is stored per user and per host, so repeat the command for every account on the system. For fleet-wide enforcement, deploy a configuration profile through your MDM instead, which applies the setting to all current and future users.

            **Impact:**

            Disabling Bluetooth Sharing prevents the system from accepting file transfers over Bluetooth, reducing the risk of unauthorized access or exploitation of Bluetooth vulnerabilities.
        - id: gui
          desc: |
            **Using the GUI**

            1. Open **System Settings**
            2. Select **General**
            3. Select **Sharing**
            4. Turn off **Bluetooth Sharing**

            On macOS 12 and earlier, open **System Preferences**, select **Sharing**, and uncheck **Bluetooth Sharing**.

            **Impact:**

            Disabling Bluetooth Sharing prevents the system from accepting file transfers over Bluetooth, reducing the risk of unauthorized access or exploitation of Bluetooth vulnerabilities.
        - id: ansible
          desc: |
            **Using Ansible**

            To disable Bluetooth Sharing using Ansible, you can use the following playbook:

            ```yaml
            ---
            - name: Disable Bluetooth Sharing
              hosts: all
              become: true
              become_user: <username>
              tasks:
                - name: Disable Bluetooth Sharing for user
                  ansible.builtin.command: defaults -currentHost write com.apple.Bluetooth PrefKeyServicesEnabled -bool false
            ```

            This preference is stored per user and per host, so run the task with `become_user` set to each account on the system. For fleet-wide enforcement, deploy a configuration profile through your MDM instead, which applies the setting to all current and future users.

            **Impact:**

            Disabling Bluetooth Sharing prevents the system from accepting file transfers over Bluetooth, reducing the risk of unauthorized access or exploitation of Bluetooth vulnerabilities.
    refs:
      - url: https://support.apple.com/guide/security/welcome/web
        title: Apple Platform Security Guide

  - uid: mondoo-macos-security-disable-content-caching
    title: Disable Content Caching
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: macos.sharing.contentCaching == false
    docs:
      desc: |
        This check ensures that Content Caching is disabled on macOS systems to prevent unnecessary resource usage and potential security risks associated with local content distribution.

        **Why this matters**

        Content Caching is a service introduced in macOS High Sierra (10.13) to reduce bandwidth usage by caching software updates and other Apple-provided content on local networks. While this feature can be beneficial in specific scenarios, it may introduce unnecessary complexity and resource usage in environments where such caching is not required.

        By disabling Content Caching, organizations can ensure that macOS devices do not act as local content distribution nodes unless explicitly required. This reduces the attack surface, minimizes resource overhead, and aligns with best practices for securing macOS systems.

        Properly managing Content Caching contributes to:
          - Reduced network complexity and resource usage
          - Prevention of unauthorized content distribution
          - Compliance with security best practices and organizational policies

        Without these protections, Content Caching may inadvertently expose sensitive data or consume unnecessary resources, undermining the overall security and efficiency of the system.
      audit: |
        ### Audit via System Settings

        1. Open **System Settings**.
        2. Select **General**, then **Sharing**.
        3. Review the **Content Caching** setting.

        A passing result shows **Content Caching** turned off. A failing result shows it turned on.

        ### Audit via CLI

        1. Open the **Terminal** app.
        2. Query the Content Caching status:

           ```bash
           AssetCacheManagerUtil status
           ```

        A passing result reports `Activated: false` and `Active: false`. A failing result reports `Activated: true`.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Run this command to disable Content Caching:

            ```bash
            sudo AssetCacheManagerUtil deactivate
            ```

            The output will include `Content caching deactivated`.

            **Impact:**

            Disabling Content Caching may increase bandwidth usage between local subnets and the internet, particularly when downloading large updates or content from Apple servers.
        - id: gui
          desc: |
            **Using the GUI**

            1. Open **System Settings**
            2. Select **General**
            3. Select **Sharing**
            4. Turn off **Content Caching**

            On macOS 12 and earlier, open **System Preferences**, select **Sharing**, and uncheck **Content Caching**.

            **Impact:**

            Disabling Content Caching may increase bandwidth usage between local subnets and the internet, particularly when downloading large updates or content from Apple servers.
        - id: ansible
          desc: |
            **Using Ansible**

            To disable Content Caching using Ansible, you can use the following playbook:

            ```yaml
            ---
            - name: Disable Content Caching
              hosts: all
              become: true
              tasks:
                - name: Disable Content Caching
                  ansible.builtin.command: AssetCacheManagerUtil deactivate
            ```

            **Impact:**

            Disabling Content Caching may increase bandwidth usage between local subnets and the internet, particularly when downloading large updates or content from Apple servers.
    refs:
      - url: https://support.apple.com/guide/security/welcome/web
        title: Apple Platform Security Guide
  - uid: mondoo-macos-security-disable-file-sharing
    title: Disable File Sharing
    impact: 60
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: macos.sharing.fileSharing == false
    docs:
      desc: |
        This check ensures that SMB file sharing is disabled on macOS systems to reduce the attack surface and enhance security.

        **Why this matters**

        SMB (Server Message Block) is a protocol used for file sharing, commonly utilized by Windows and Linux systems to access shared files on a Mac. While SMB can be convenient, it stores passwords in a less secure manner compared to AFP, potentially exposing sensitive information.

        By disabling SMB file sharing, the system minimizes the risk of unauthorized access and mitigates potential vulnerabilities associated with the protocol. This aligns with best practices for reducing unnecessary services and features that could be exploited by attackers.

        Disabling SMB file sharing contributes to:
          - Enhanced system security by reducing the attack surface
          - Prevention of unauthorized access to shared files
          - Compliance with security best practices and organizational policies

        Without these protections, SMB file sharing could expose sensitive data and increase the risk of exploitation, undermining the overall security posture of the system.
      audit: |
        ### Audit via System Settings

        1. Open **System Settings**.
        2. Select **General**, then **Sharing**.
        3. Review the **File Sharing** setting.

        A passing result shows **File Sharing** turned off. A failing result shows it turned on.

        ### Audit via CLI

        1. Open the **Terminal** app.
        2. Check whether the SMB daemon is loaded:

           ```bash
           sudo launchctl list | grep com.apple.smbd
           ```

        A passing result returns no output, confirming the SMB service is not loaded. A failing result lists `com.apple.smbd`.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Run these commands to disable SMB file sharing:

            ```bash
            sudo launchctl disable system/com.apple.smbd
            sudo launchctl bootout system/com.apple.smbd
            ```

            The `bootout` command reports an error if the service is not currently running; that error is harmless. On older macOS versions you can use the legacy form `sudo launchctl unload -w /System/Library/LaunchDaemons/com.apple.smbd.plist`.

            **Impact:**

            Disabling File Sharing prevents the system from being used as a file server, reducing its visibility and potential attack surface. For environments requiring file sharing, hardened servers should be used instead of user endpoints.
        - id: gui
          desc: |
            **Using the GUI**

            1. Open **System Settings**
            2. Select **General**
            3. Select **Sharing**
            4. Turn off **File Sharing**

            On macOS 12 and earlier, open **System Preferences**, select **Sharing**, and uncheck **File Sharing**.

            **Impact:**

            Disabling File Sharing prevents the system from being used as a file server, reducing its visibility and potential attack surface. For environments requiring file sharing, hardened servers should be used instead of user endpoints.
        - id: ansible
          desc: |
            **Using Ansible**

            To disable File Sharing using Ansible, you can use the following playbook:

            ```yaml
            ---
            - name: Disable File Sharing
              hosts: all
              become: true
              tasks:
                - name: Disable the SMB daemon
                  ansible.builtin.command: launchctl disable system/com.apple.smbd
                - name: Stop the SMB daemon
                  ansible.builtin.command: launchctl bootout system/com.apple.smbd
                  register: bootout_result
                  failed_when: false
                  changed_when: bootout_result.rc == 0
            ```

            The `bootout` task exits non-zero harmlessly when the daemon is not running; that failure is suppressed with `failed_when: false`, and `changed` is reported only when it actually stops the service. The `disable` task runs `launchctl` through `ansible.builtin.command`, which always reports `changed` even when the daemon is already disabled, so this playbook is not fully idempotent.

            **Impact:**

            Disabling File Sharing prevents the system from being used as a file server, reducing its visibility and potential attack surface. For environments requiring file sharing, hardened servers should be used instead of user endpoints.
