  - uid: mondoo-macos-security-disable-remote-management
    title: Disable Remote Management
    impact: 50
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: macos.sharing.remoteManagement == false
    docs:
      desc: |
        This check ensures that Remote Management is disabled on macOS systems to prevent unauthorized access and potential misuse of the Apple Remote Desktop (ARD) client.

        **Why this matters**

        Remote Management allows administrators to remotely view the current screen, install software, and manage client Macs. While this feature can be useful in managed environments, it introduces potential vulnerabilities by exposing the system to unauthorized access or untrusted hosts, especially on mobile systems.

        By disabling Remote Management, organizations can:
          - Reduce the attack surface of the system
          - Prevent unauthorized remote access
          - Enhance security posture in environments handling sensitive data or exposed to untrusted networks

        Without these protections, Remote Management may inadvertently expose the system to potential threats, undermining its overall security posture.
      audit: |
        ### Audit via System Settings

        1. Open **System Settings**.
        2. Select **General**, then **Sharing**.
        3. Review the **Remote Management** setting.

        A passing result shows **Remote Management** turned off. A failing result shows it turned on.

        ### Audit via CLI

        1. Open the **Terminal** app.
        2. Check whether the Apple Remote Desktop agent is running:

           ```bash
           ps -axc | grep ARDAgent
           ```

        A passing result returns no output, confirming the agent is not running. A failing result lists `ARDAgent`.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Run this command to disable Remote Management:

            ```bash
            sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -deactivate -stop
            ```

            **Impact:**

            Disabling Remote Management may affect organizations that rely on Apple Remote Desktop for client management. Ensure alternative management solutions are in place if required.
        - id: gui
          desc: |
            **Using the GUI**

            1. Open **System Settings**
            2. Select **General**
            3. Select **Sharing**
            4. Turn off **Remote Management**

            On macOS 12 and earlier, open **System Preferences**, select **Sharing**, and uncheck **Remote Management**.

            **Impact:**

            Disabling Remote Management may affect organizations that rely on Apple Remote Desktop for client management. Ensure alternative management solutions are in place if required.
        - id: ansible
          desc: |
            **Using Ansible**

            To disable Remote Management using Ansible, you can use the following playbook:

            ```yaml
            ---
            - name: Disable Remote Management
              hosts: all
              become: true
              tasks:
                - name: Disable Remote Management
                  ansible.builtin.command: /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -deactivate -stop
            ```

            **Impact:**

            Disabling Remote Management may affect organizations that rely on Apple Remote Desktop for client management. Ensure alternative management solutions are in place if required.
