  - uid: mondoo-macos-security-disable-screen-sharing
    title: Disable Screen Sharing
    impact: 30
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-7
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-6
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc6-8-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: macos.sharing.screenSharing == false
    docs:
      desc: |
        This check ensures that Screen Sharing is disabled on macOS systems to prevent unauthorized access and control of the system.

        **Why this matters**

        Screen Sharing allows a computer to connect to another computer on a network and display the computer's screen. While this feature can be useful for remote support or collaboration, it introduces potential vulnerabilities by exposing the system to unauthorized access or misuse.

        By disabling Screen Sharing, organizations can:
          - Reduce the attack surface of the system
          - Prevent unauthorized remote control of the computer
          - Enhance security posture in environments handling sensitive data or exposed to untrusted networks

        Without these protections, Screen Sharing may inadvertently expose the system to potential threats, undermining its overall security posture.
      audit: |
        ### Audit via System Settings

        1. Open **System Settings**.
        2. Select **General**, then **Sharing**.
        3. Review the **Screen Sharing** setting.

        A passing result shows **Screen Sharing** turned off. A failing result shows it turned on.

        ### Audit via CLI

        1. Open the **Terminal** app.
        2. Check whether the screen sharing daemon is loaded:

           ```bash
           sudo launchctl list | grep com.apple.screensharing
           ```

        A passing result returns no output, confirming the service is not loaded. A failing result lists `com.apple.screensharing`.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            Run these commands to disable Screen Sharing:

            ```bash
            sudo launchctl disable system/com.apple.screensharing
            sudo launchctl bootout system/com.apple.screensharing
            ```

            The `disable` command marks the daemon disabled so it does not start again, and `bootout` stops it now. The `bootout` command reports an error if the service is not currently running; that error is harmless. On older macOS versions you can use the legacy form `sudo launchctl unload -w /System/Library/LaunchDaemons/com.apple.screensharing.plist`.

            **Impact:**

            Disabling Screen Sharing prevents remote access to the system's screen. For environments requiring remote support, ensure alternative secure methods are in place, such as using dedicated remote management tools with proper access controls.
        - id: gui
          desc: |
            **Using the GUI**

            1. Open **System Settings**
            2. Select **General**
            3. Select **Sharing**
            4. Turn off **Screen Sharing**

            On macOS 12 and earlier, open **System Preferences**, select **Sharing**, and uncheck **Screen Sharing**.

            **Impact:**

            Disabling Screen Sharing prevents remote access to the system's screen. For environments requiring remote support, ensure alternative secure methods are in place, such as using dedicated remote management tools with proper access controls.
        - id: ansible
          desc: |
            **Using Ansible**

            To disable Screen Sharing using Ansible, you can use the following playbook:

            ```yaml
            ---
            - name: Disable Screen Sharing
              hosts: all
              become: true
              tasks:
                - name: Disable the Screen Sharing daemon
                  ansible.builtin.command: launchctl disable system/com.apple.screensharing
                - name: Stop the Screen Sharing daemon
                  ansible.builtin.command: launchctl bootout system/com.apple.screensharing
                  register: bootout_result
                  failed_when: false
                  changed_when: bootout_result.rc == 0
            ```

            The `bootout` task exits non-zero harmlessly when the daemon is not running; that failure is suppressed with `failed_when: false`, and `changed` is reported only when it actually stops the service. The `disable` task runs `launchctl` through `ansible.builtin.command`, which always reports `changed` even when the daemon is already disabled, so this playbook is not fully idempotent.

            **Impact:**

            Disabling Screen Sharing prevents remote access to the system's screen. For environments requiring remote support, ensure alternative secure methods are in place, such as using dedicated remote management tools with proper access controls.
