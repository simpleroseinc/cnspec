policies:
  - uid: mondoo-linux-workstation-security
    name: Mondoo Linux Workstation Security
    version: 1.2.0-simplerose
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: linux
    require:
      - provider: os
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure Linux workstation access, firewall, and services
    docs:
      desc: |
        The Mondoo Linux Workstation Security policy identifies critical misconfigurations on Linux workstations that could leave end-user systems vulnerable to malware, unauthorized access, and data theft. Workstations are a frequent first foothold for attackers, with phishing, malicious downloads, and physical access threats all targeting the endpoint. Workstation hardening directly limits what an attacker can do once they get in.

        This policy provides security checks across key Linux workstation areas:

        - Secure Boot configuration
        - Disk encryption (LUKS) and removable media handling
        - Host firewall configuration
        - Screen lock and idle session policies
        - User authentication and password requirements
        - Automatic updates and patch posture

        This policy supports Red Hat, Debian, Ubuntu, and SUSE distributions on x86 and x64 platforms.

        Learn more about scanning Linux in the [cnspec Linux documentation](https://mondoo.com/docs/cnspec/os/linux).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Secure Boot
        filters: |
          asset.family.contains('linux')
          packages.where(name == /xorg|xserver|wayland/i).any(installed)
        checks:
          - uid: mondoo-linux-workstation-security-secure-boot-is-enabled
      - title: Disk encryption
        filters: |
          asset.family.contains('linux')
          packages.where(name == /xorg|xserver|wayland/i).any(installed)
        checks:
          - uid: mondoo-linux-workstation-security-aes-encryption-algorithm
          - uid: mondoo-linux-workstation-security-root-and-home-are-encrypted
      - title: Endpoint protection
        filters: |
          asset.family.contains('linux')
          packages.where(name == /xorg|xserver|wayland/i).any(installed)
        checks:
          - uid: simplerose-linux-workstation-security-crowdstrike-installed
    scoring_system: highest impact
queries:

  - uid: mondoo-linux-workstation-security-secure-boot-is-enabled
    title: Ensure Secure Boot is enabled
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      machine.secureboot.enabled
    docs:
      desc: |
        This check verifies that UEFI Secure Boot is enabled so the firmware validates the signature of the kernel and boot components before executing them.

        **Why this matters**

        Secure Boot establishes a chain of trust from the firmware through the bootloader and kernel. Without it, an attacker who can write to the boot path can load a tampered or malicious kernel that runs before any operating-system protections take effect.

        - **Prevents bootkits:** Signature verification blocks unsigned or modified boot code from running.
        - **Protects the kernel:** Only kernels signed by a trusted key are allowed to boot.
        - **Anchors platform integrity:** A verified boot path is the foundation for measured boot and full-disk encryption protections.
      audit: |
        Run this command to inspect the Secure Boot state:

        ```bash
        mokutil --sb-state
        ```

        A passing result prints `SecureBoot enabled`. A failing result prints `SecureBoot disabled` or reports that the platform does not support Secure Boot.
      remediation:
        - id: manual
          desc: |
            Enable Secure Boot in your computer's firmware and use a Linux distribution supporting Secure Boot.

            1. Restart your computer and enter the UEFI firmware settings (usually by pressing F2, F10, DEL, or ESC during startup).
            2. Locate the **Secure Boot** option under the **Boot** or **Security** tab.
            3. Set Secure Boot to **Enabled**.
            4. Save changes and exit the UEFI settings.
            5. Ensure your Linux distribution supports Secure Boot (most major distributions do).
  - uid: mondoo-linux-workstation-security-root-and-home-are-encrypted
    title: Ensure / and /home are encrypted
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |-
      mount.list.where( path == '/') {
        lsblkDevice = parse.json(content: command('lsblk -a --json -s ' + _.device).stdout).params
        lsblkDevice['blockdevices'][0]['children'][0]['type'] == 'crypt' || lsblkDevice['blockdevices'][0]['type'] == 'crypt'
      }
      if( mount.list.where( path == /home/) != [] ) {
        mount.list.where( path == '/home') {
          lsblkDevice = parse.json(content: command('lsblk -a --json -s ' + _.device).stdout).params
          lsblkDevice['blockdevices'][0]['children'][0]['type'] == 'crypt' || lsblkDevice['blockdevices'][0]['type'] == 'crypt'
        }
      }
    docs:
      desc: |
        This check verifies that the `/` and `/home` filesystems reside on encrypted block devices, confirmed by a `crypt` device type in the `lsblk` device tree.

        **Why this matters**

        Workstations are frequently lost or stolen. Without full-disk encryption, anyone with physical possession of the drive can read every file on it by attaching it to another system.

        - **Protects data at rest:** Encryption renders the contents of `/` and `/home` unreadable without the unlock key.
        - **Mitigates device theft:** A stolen laptop yields no usable data when its system and home partitions are encrypted.
        - **Supports compliance:** Encrypting endpoint storage satisfies data-protection requirements for systems that handle sensitive information.
      audit: |
        Run these commands to identify the devices serving `/` and `/home` and confirm they are encrypted:

        ```bash
        df /  /home
        lsblk -o NAME,TYPE,MOUNTPOINT
        dmsetup status
        ```

        A passing result shows the devices backing `/` and `/home` mapped through a `crypt` device. A failing result shows either filesystem on a plain, unencrypted device.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            > **Warning:** Encrypting an existing installation rewrites the entire device and any mistake destroys data. Back up all data to external storage before you begin. The root filesystem cannot be encrypted while it is mounted, so both procedures below run from the distribution installer or a live system.

            The recommended path is a reinstall with full-disk encryption:

            1. Back up all user data to external storage.
            2. Boot the distribution installer and select the encrypted disk or encrypted LVM layout option.
            3. Restore user data after the installation completes.

            Alternatively, encrypt the existing filesystem in place from a live system. The `--reduce-device-size` option shrinks the device by 32 MiB to make room for the LUKS header, so the filesystem inside it must first be shrunk by at least that amount or it is truncated and data is lost. For an ext4 filesystem:

            ```bash
            DEVICE=/dev/sdX2
            e2fsck -f "$DEVICE"
            resize2fs -M "$DEVICE"
            cryptsetup reencrypt --encrypt --type luks2 --cipher aes-xts-plain64 --key-size 512 --reduce-device-size 32m "$DEVICE"
            cryptsetup open "$DEVICE" root
            resize2fs /dev/mapper/root
            ```

            The final `resize2fs` grows the filesystem back to fill the encrypted volume. For other filesystem types, use that filesystem's shrink tooling before re-encrypting.

            Replace `/dev/sdX2` with the partition serving `/` or `/home`. After encrypting, update `/etc/crypttab` and `/etc/fstab` to reference the mapped device, then regenerate the initramfs with `update-initramfs -u -k all` on Debian and Ubuntu or `dracut -f --regenerate-all` on Red Hat and SUSE distributions so the system can unlock the volume at boot.
        # No bash or ansible remediation: encrypting existing volumes is an offline, interactive, data-destructive procedure that must not be automated against a running system.
  - uid: mondoo-linux-workstation-security-aes-encryption-algorithm
    title: Ensure AES encryption algorithm is used
    impact: 90
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: |
      lsblk.list.any( fstype == /crypt/ )
      lsblk.list.where( fstype == /crypt/).all(
        parse.json(
          content: command('cryptsetup --dump-json-metadata luksDump /dev/disk/by-uuid/' + uuid).stdout
        ).params['segments']['0']['encryption'].contains('aes-xts') ||
        command('cryptsetup luksDump /dev/disk/by-uuid/' + uuid).stdout.lines.where( _ == /Cipher\:/).all(/aes/)
      )
    docs:
      desc: |
        This check verifies that every LUKS-encrypted volume uses an AES cipher in XTS mode, such as `aes-xts-plain64` or `aes-xts-benbi`.

        **Why this matters**

        The strength of full-disk encryption depends on the cipher protecting the data. A weak or non-standard cipher can leave encrypted volumes vulnerable to cryptographic attack even when encryption appears to be enabled.

        - **Ensures strong confidentiality:** AES in XTS mode is the established standard for block-device encryption and resists known attacks.
        - **Avoids weak ciphers:** Confirming the cipher prevents volumes from being protected by deprecated or insecure algorithms.
        - **Maintains consistent protection:** Verifying every encrypted volume ensures no partition relies on a substandard cipher.
      audit: |
        Run this command for each encrypted device to inspect the cipher in use:

        ```bash
        cryptsetup luksDump /dev/disk/by-uuid/<device-uuid>
        ```

        A passing result shows the `Cipher` field set to an `aes-xts` variant. A failing result shows a non-AES cipher or a mode other than XTS.
      remediation:
        - id: cli
          desc: |
            **Using the CLI**

            > **Warning:** Converting the cipher rewrites every sector of the volume. Back up all data and ensure reliable power before you begin. Run the conversion from a live system with the filesystem unmounted.

            For LUKS2 volumes, convert the cipher in place without destroying data:

            ```bash
            DEVICE=/dev/sdX2
            cryptsetup reencrypt --cipher aes-xts-plain64 --key-size 512 "$DEVICE"
            ```

            For LUKS1 volumes, first convert the header to LUKS2, then re-encrypt:

            ```bash
            DEVICE=/dev/sdX2
            cryptsetup convert --type luks2 "$DEVICE"
            cryptsetup reencrypt --cipher aes-xts-plain64 --key-size 512 "$DEVICE"
            ```

            Replace `/dev/sdX2` with the LUKS partition. Verify the cipher after the conversion completes:

            ```bash
            DEVICE=/dev/sdX2
            cryptsetup luksDump "$DEVICE"
            ```
        # No bash or ansible remediation: cipher conversion is an offline, data-rewriting procedure that must not be automated against a running system.
  - uid: simplerose-linux-workstation-security-crowdstrike-installed
    title: Ensure CrowdStrike Falcon is installed and running
    impact: 90
    tags:
      simplerose.com/category: endpoint-protection
    mql: |
      file("/opt/CrowdStrike/falconctl").exists
      command("systemctl is-active falcon-sensor").stdout.trim == "active"
    docs:
      desc: |
        Matches linux_normalize.sh: falconctl present and falcon-sensor service active.
