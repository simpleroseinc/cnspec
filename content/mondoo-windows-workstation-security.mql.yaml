policies:
  - uid: mondoo-windows-workstation-security
    name: Mondoo Microsoft Windows Workstation Security
    version: 0.6.0-simplerose
    license: BUSL-1.1
    tags:
      mondoo.com/category: security
      mondoo.com/platform: windows:10,windows:11
    require:
      - provider: os
    authors:
      - name: Mondoo, Inc.
        email: hello@mondoo.com
    summary: Secure Windows workstation access, updates, and configs
    docs:
      desc: |
        The Mondoo Microsoft Windows Workstation Security policy identifies critical misconfigurations on Windows workstations that could leave end-user devices vulnerable to malware, unauthorized access, and data theft. Workstations are a frequent first foothold for attackers, with phishing, malicious downloads, and physical access threats all targeting the endpoint. Workstation hardening directly limits what an attacker can do once they get in.

        This policy provides security checks across key Windows workstation areas:

        - Secure Boot configuration
        - BitLocker disk encryption
        - Antivirus and Microsoft Defender presence
        - Automatic updates and patch posture
        - Windows Firewall configuration
        - User Account Control (UAC) and screen lock policies

        This policy supports Windows 10 and Windows 11.

        Learn more about scanning Windows in the [cnspec Windows documentation](https://mondoo.com/docs/cnspec/os/windows).

        Have suggestions for new checks in this policy? Visit our [cnspec repository](https://github.com/mondoohq/cnspec).
    groups:
      - title: Secure Boot
        filters: |
          asset.platform.contains("windows")
          windows.computerInfo['OsProductType'] == 1
        checks:
          - uid: simplerose-windows-workstation-security-updates-current
          - uid: simplerose-windows-workstation-security-crowdstrike-installed
          - uid: mondoo-windows-workstation-security-bitlocker-enabled
          - uid: mondoo-windows-workstation-security-secure-boot-is-enabled
    scoring_system: average
queries:
  - uid: mondoo-windows-workstation-security-bitlocker-enabled
    title: Ensure BitLocker Encryption is Enabled
    impact: 100
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-cek-03
      compliance/dora: dora-art-9
      compliance/hipaa: hipaa-security-ss164-312-a-2-iv-access-control-encryption-and-decryption
      compliance/iso-27001-2022: iso-27001-2022-a-8-24
      compliance/nis-2: nis-2-21-2-h
      compliance/nist-csf-1: nist-csf-1-pr-ds-1
      compliance/nist-csf-2: nist-csf-2-pr-ds-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-sc-28
      compliance/nist-sp-800-171: nist-sp-800-171--3-13-16
      compliance/pci-dss-4: pcidss-requirement-3-5-1
      compliance/soc2-2017: soc2-control-cc6-1-10
      compliance/vda-isa-5: vda-isa-5-5-1-1
    mql: windows.bitlocker.volumes.all( protectionStatus["text"] == "Protected" )
    docs:
      desc: |
        This check ensures that every disk volume is protected by BitLocker drive encryption. BitLocker encodes data so it is unreadable to anyone who does not hold the decryption key, which keeps information confidential if a workstation is lost or stolen.

        **Why this matters**

        - **Data theft protection:** An encrypted drive cannot be read by attaching it to another system or booting an alternate operating system.
        - **Loss and theft resilience:** Laptops are frequently lost or stolen; encryption renders the data on them useless to whoever ends up with the device.
        - **Tamper resistance:** Pairing BitLocker with a TPM detects offline modification of boot components and blocks unauthorized changes.
        - **Compliance:** Many regulatory frameworks require encryption of data at rest on end-user devices.
      audit: |
        ### Audit via Settings

        1. Open **Settings** and go to **Privacy & security** > **Device encryption**, or open **Control Panel** > **System and Security** > **BitLocker Drive Encryption**.
        2. Review the protection status listed for each drive.

        The workstation passes when every volume reports BitLocker as on. It fails if any volume reports BitLocker as off.

        ### Audit via PowerShell

        1. Open an elevated PowerShell session.
        2. Display the encryption status of all volumes:

           ```powershell
           Get-BitLockerVolume
           ```

        The workstation passes when every volume reports a `ProtectionStatus` of `On`. It fails if any volume reports `Off`.
      remediation:
        - id: gui
          desc: |
            **Using the Windows interface**

            Turn on device encryption:

            1. Sign in to Windows with an administrator account.
            2. On Windows 11, select **Start** > **Settings** > **Privacy & security** > **Device encryption**. On Windows 10, select **Start** > **Settings** > **Update & Security** > **Device encryption**.
            3. If device encryption is turned off, select **Turn on**.

            If Device encryption is not available, use standard BitLocker encryption:

            1. Sign in to your Windows device with an administrator account.
            2. In the search box on the taskbar, type **Manage BitLocker** and select it from the list of results.
            3. Select **Turn on BitLocker** and follow the instructions. When prompted, save the recovery key to your Microsoft account, to Active Directory, or to a file stored off the device. Do not skip this step; without the recovery key the data is unrecoverable after a TPM or hardware fault.
            4. Repeat for every fixed data drive shown in the BitLocker control panel, or turn on auto-unlock for data drives.

            Note: BitLocker is not available on Windows 10/11 Home edition.
        - id: powershell
          desc: |
            **Using PowerShell**

            Warning: Always add and back up a recovery password before enabling BitLocker. Without an escrowed recovery key, a TPM fault, firmware update, or hardware change makes the data permanently unrecoverable.

            Add a recovery password protector, escrow it, and enable BitLocker on the operating system drive:

            ```powershell
            Add-BitLockerKeyProtector -MountPoint "C:" -RecoveryPasswordProtector
            $rp = (Get-BitLockerVolume -MountPoint "C:").KeyProtector | Where-Object KeyProtectorType -eq "RecoveryPassword"
            Backup-BitLockerKeyProtector -MountPoint "C:" -KeyProtectorId $rp[0].KeyProtectorId
            Enable-BitLocker -MountPoint "C:" -EncryptionMethod XtsAes256 -UsedSpaceOnly -TpmProtector
            ```

            `Backup-BitLockerKeyProtector` escrows to Active Directory. On Microsoft Entra joined devices, use `BackupToAAD-BitLockerKeyProtector` instead. On standalone devices, record the `RecoveryPassword` value from `$rp` and store it off the device.

            If your device does not have a TPM, use a password protector instead:

            ```powershell
            $pw = Read-Host -AsSecureString -Prompt "BitLocker password"
            Enable-BitLocker -MountPoint "C:" -EncryptionMethod XtsAes256 -UsedSpaceOnly -PasswordProtector -Password $pw
            ```

            This check requires every volume to be protected. Encrypt each remaining fixed data drive and let it unlock automatically once the operating system drive is protected:

            ```powershell
            Enable-BitLocker -MountPoint "D:" -EncryptionMethod XtsAes256 -UsedSpaceOnly -RecoveryPasswordProtector
            Enable-BitLockerAutoUnlock -MountPoint "D:"
            ```

            To check the current BitLocker status:

            ```powershell
            Get-BitLockerVolume
            ```
        - id: ansible
          desc: |
            **Using Ansible**

            No BitLocker module exists in the ansible.windows or community.windows collections, so run the BitLocker cmdlets through `win_powershell`:

            ```yaml
            ---
            - name: Enable BitLocker on the operating system drive
              hosts: all

              tasks:
                - name: Enable BitLocker with a TPM protector and an escrowed recovery password
                  ansible.windows.win_powershell:
                    script: |
                      $vol = Get-BitLockerVolume -MountPoint "C:"
                      if ($vol.ProtectionStatus -eq "On") {
                        $Ansible.Changed = $false
                      } else {
                        Add-BitLockerKeyProtector -MountPoint "C:" -RecoveryPasswordProtector | Out-Null
                        $rp = (Get-BitLockerVolume -MountPoint "C:").KeyProtector |
                          Where-Object KeyProtectorType -eq "RecoveryPassword"
                        Backup-BitLockerKeyProtector -MountPoint "C:" -KeyProtectorId $rp[0].KeyProtectorId
                        Enable-BitLocker -MountPoint "C:" -EncryptionMethod XtsAes256 -UsedSpaceOnly -TpmProtector
                        $Ansible.Changed = $true
                      }
            ```
    refs:
      - url: https://support.microsoft.com/en-us/windows/turn-on-device-encryption-0c453637-bc88-5f74-5105-741561aae838#:~:text=Turn%20on%20standard%20BitLocker%20encryption,-Sign%20in%20to&text=In%20the%20search%20box%20on,is%20available%20for%20your%20device.
        title: Turn on device encryption
  - uid: mondoo-windows-workstation-security-secure-boot-is-enabled
    title: Ensure Secure Boot is enabled
    impact: 40
    tags:
      compliance/bsi-sys-1-5: false
      compliance/csa-cloud-controls-matrix-4: cloud-controls-matrix-4-ccc-06
      compliance/dora: dora-art-9
      compliance/hipaa: false
      compliance/iso-27001-2022: iso-27001-2022-a-8-9
      compliance/nis-2: nis-2-21-2-e
      compliance/nist-csf-1: nist-csf-1-pr-ip-1
      compliance/nist-csf-2: nist-csf-2-pr-ps-01
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-cm-6
      compliance/nist-sp-800-171: nist-sp-800-171--3-4-2
      compliance/pci-dss-4: pcidss-requirement-2-2-1
      compliance/soc2-2017: soc2-control-cc7-1-1
      compliance/vda-isa-5: vda-isa-5-5-2-1
    mql: |
      machine.secureboot.enabled == true
    docs:
      desc: |
        This check ensures that Secure Boot is active. Secure Boot is a boot-integrity feature of the Unified Extensible Firmware Interface (UEFI) standard that allows the system to start only with firmware and boot loaders signed by trusted keys.

        **Why this matters**

        - **Bootkit defense:** Secure Boot blocks unsigned or tampered boot code, preventing malware from loading before the operating system starts.
        - **Boot chain integrity:** Only software trusted by the firmware can run during startup, establishing a verified foundation for the rest of the system.
        - **Persistence resistance:** Firmware-level malware that survives operating system reinstalls is far harder to install when Secure Boot is enforced.
        - **Compliance:** Secure Boot is a baseline configuration requirement in common Windows hardening benchmarks.
      audit: |
        ### Audit via System Information

        1. Press **Windows + R**, type `msinfo32`, and press **Enter**.
        2. In **System Summary**, locate the **Secure Boot State** value.

        The workstation passes when Secure Boot State reports **On**. It fails if the value reports **Off** or **Unsupported**.

        ### Audit via PowerShell

        1. Open an elevated PowerShell session.
        2. Query the Secure Boot status:

           ```powershell
           Confirm-SecureBootUEFI
           ```

        The workstation passes when the command returns `True`. It fails if the command returns `False` or reports that the platform does not support Secure Boot.
      remediation:
        - id: gui
          desc: |
            **Using the UEFI firmware interface**

            Warning: If Windows was installed in legacy BIOS mode on an MBR disk, switching the firmware to UEFI with Secure Boot leaves the system unable to boot. Before changing firmware settings, press **Windows + R**, run `msinfo32`, and confirm **BIOS Mode** reports **UEFI**. If it reports **Legacy**, first convert the system disk from an elevated command prompt:

            ```powershell
            mbr2gpt /validate /allowFullOS
            mbr2gpt /convert /allowFullOS
            ```

            To enable Secure Boot, access the UEFI firmware settings on your computer. The steps vary by manufacturer, but generally:

            1. Restart your computer and enter the UEFI firmware settings. This is usually done by pressing a specific key during startup, commonly F2, F10, DEL, or ESC.
            2. Disable any **Legacy Boot** or **CSM** compatibility option if it is enabled.
            3. Look for the **Secure Boot** option, usually under the **Boot** or **Security** tab.
            4. Change the Secure Boot setting to **Enabled**.
            5. Save the changes and exit the UEFI settings.
    refs:
      - url: https://media.defense.gov/2020/Sep/15/2002497594/-1/-1/0/CTR-UEFI-Secure-Boot-Customization-UOO168873-20.PDF
        title: UEFI Secure Boot Customization
  - uid: simplerose-windows-workstation-security-updates-current
    title: Ensure Windows has installed a recent update
    impact: 80
    tags:
      simplerose.com/category: patch-management
      compliance/nist-csf-2: nist-csf-2-pr-ps-02
      compliance/nist-sp-800-53-rev5: nist-sp-800-53-rev5-si-2
      compliance/soc2-2017: soc2-control-cc7-1-1
    mql: |
      windows.hotfixes.where( installedOn != null && time.now - installedOn < 60 * time.day ).length > 0
    docs:
      desc: |
        Verifies that at least one Windows update (hotfix) was installed within the last
        60 days. SimpleRose normalize applies updates on every run via PSWindowsUpdate
        (`Get-WindowsUpdate` / `Install-WindowsUpdate`) rather than through Automatic
        Update GPO keys, so this check measures the actual patch outcome instead of the
        Windows Update service state or policy registry values.

        **Why this matters**

        - **Real posture, not config:** A recently installed hotfix proves the device is
          genuinely being patched, regardless of how updates are delivered.
        - **Vulnerability remediation:** Security patches close flaws attackers actively
          exploit; confirming recent installs shows the exposure window is being managed.
      audit: |
        1. Open an elevated PowerShell session.
        2. List installed hotfixes and their install dates:

           ```powershell
           Get-HotFix | Sort-Object InstalledOn -Descending | Select-Object -First 5
           ```

        The workstation passes when the most recent hotfix was installed within the last
        60 days. It fails when no update has been installed in that window.
      remediation:
        - id: powershell
          desc: |
            **Using PowerShell (matches SimpleRose normalize)**

            Install available updates with the PSWindowsUpdate module:

            ```powershell
            Install-Module -Name PSWindowsUpdate -Force -Confirm:$false
            Import-Module PSWindowsUpdate
            Install-WindowsUpdate -AcceptAll -IgnoreReboot -Confirm:$false
            ```
    refs:
      - url: https://learn.microsoft.com/en-us/windows/deployment/update/waas-wu-settings
        title: Manage additional Windows Update settings
  - uid: simplerose-windows-workstation-security-crowdstrike-installed
    title: Ensure CrowdStrike Falcon is installed and running
    impact: 100
    tags:
      simplerose.com/category: endpoint-protection
    mql: |
      file("C:\\Program Files\\CrowdStrike\\CSFalconService.exe").exists
      service('CSFalconService').running
    docs:
      desc: |
        Verifies CrowdStrike Falcon EDR is installed and the CSFalconService
        is running. Matches SimpleRose normalize (windows_normalize.ps1).
